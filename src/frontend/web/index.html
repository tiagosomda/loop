<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="tiago's dev loop — an autonomous, agent-driven action item board.">
  <meta name="application-name" content="dev loop">
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#F4F6FB" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#070A12" media="(prefers-color-scheme: dark)">

  <style>
    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background-color: #070A12;
    }

    body {
      overflow: hidden;
    }

    @media (prefers-color-scheme: light) {
      html,
      body {
        background-color: #F4F6FB;
      }
    }
  </style>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="dev loop">
  <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

  <!-- Browser icons -->
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
  <link rel="shortcut icon" href="favicon.ico">

  <title>dev loop</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service_worker.js').catch((error) => {
          console.warn('dev loop service worker registration failed:', error);
        });
      });
    }
  </script>
</body>
</html>
